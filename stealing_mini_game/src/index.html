<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>偷窃小游戏</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
  <div id="game-canvas">
    <canvas id="canvas"></canvas>
    <div id="toast"></div>
    <!-- 结果弹窗 -->
    <div id="modal-overlay">
      <div class="modal-box">
        <div class="modal-title" id="modal-title">偷窃成功！</div>
        <div class="modal-time">本次偷窃用时：<strong id="modal-time-val">0.0秒</strong></div>
        <button class="modal-btn" id="modal-btn-restart">重新开始</button>
      </div>
    </div>
  </div>
  <div id="ui-panel">
    <div class="panel-title">偷窃小游戏</div>

    <!-- 状态 -->
    <div class="status-box" id="status-box">
      状态：<span id="state-text">潜行中</span><br>
      当前目标：<span id="target-text">无</span>
    </div>

    <!-- 偷窃进度 -->
    <div class="bar-container">
      <div class="bar-label"><span>偷窃进度</span><span id="steal-pct">0%</span></div>
      <div class="bar-track"><div class="bar-fill steal" id="steal-bar" style="width:0%"></div></div>
    </div>

    <!-- NPC警觉度 -->
    <div class="bar-container">
      <div class="bar-label"><span>NPC警觉度</span><span id="alert-pct">0%</span></div>
      <div class="bar-track"><div class="bar-fill alert" id="alert-bar" style="width:0%"></div></div>
    </div>

    <!-- 偷窃用时 -->
    <div class="timer-box">
      <span class="timer-label">本次偷窃用时</span>
      <span class="timer-value waiting" id="timer-display">等待开始...</span>
    </div>

    <!-- NPC道具列表 -->
    <div style="font-size:14px;font-weight:bold;color:#00b4d8;">NPC道具（只显示数量）</div>
    <div class="item-list" id="item-list"></div>

    <!-- 我的背包 -->
    <div style="font-size:14px;font-weight:bold;color:#4caf50;">我的背包</div>
    <div class="inventory" id="inventory">空空如也</div>

    <!-- 操作说明 -->
    <div class="controls">
      <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 移动<br>
      <kbd>Q</kbd> 长按切换上一个目标<br>
      <kbd>E</kbd> 长按切换下一个目标<br>
      <kbd>F</kbd> 长按偷窃
    </div>

    <!-- 可配置参数 -->
    <details class="config-section">
      <summary>⚙ 可配置参数</summary>
      <div class="config-grid">
        <label>白色进度需求</label><input type="number" id="cfg-white" value="40">
        <label>白色警戒倍率</label><input type="number" id="cfg-alert-white" value="1" step="0.1">
        <label>绿色进度需求</label><input type="number" id="cfg-green" value="50">
        <label>绿色警戒倍率</label><input type="number" id="cfg-alert-green" value="1.1" step="0.1">
        <label>蓝色进度需求</label><input type="number" id="cfg-blue" value="65">
        <label>蓝色警戒倍率</label><input type="number" id="cfg-alert-blue" value="1.25" step="0.1">
        <label>紫色进度需求</label><input type="number" id="cfg-purple" value="85">
        <label>紫色警戒倍率</label><input type="number" id="cfg-alert-purple" value="1.45" step="0.1">
        <label>橙色进度需求</label><input type="number" id="cfg-orange" value="105">
        <label>橙色警戒倍率</label><input type="number" id="cfg-alert-orange" value="1.7" step="0.1">
        <label>未知进度需求</label><input type="number" id="cfg-unknown" value="60">
        <label>未知警戒倍率</label><input type="number" id="cfg-alert-unknown" value="1.2" step="0.1">
        <label>偷窃速度/秒</label><input type="number" id="cfg-steal-rate" value="10">
        <label>偷窃加速系数</label><input type="number" id="cfg-boost" value="1" step="0.1">
        <label>环境参数</label><input type="number" id="cfg-env-param" value="1" step="0.1">
        <label>偷窃回退速度/秒</label><input type="number" id="cfg-decay-rate" value="3">
        <label>警戒速度/秒</label><input type="number" id="cfg-alert-rate" value="10">
        <label>警戒值上限</label><input type="number" id="cfg-alert-max" value="100">
        <label>警戒回退速度/秒</label><input type="number" id="cfg-alert-decay" value="15">
        <label>NPC视野角度(°)</label><input type="number" id="cfg-fov" value="60">
        <label>NPC视野距离</label><input type="number" id="cfg-view-dist" value="250">
        <label>NPC观察速度</label><input type="number" id="cfg-look-speed" value="1.2" step="0.1">
        <label>靠近偷窃距离</label><input type="number" id="cfg-steal-dist" value="80">
        <label>30%警觉转头倍率</label><input type="number" id="cfg-alert30-speed" value="1.4" step="0.1">
        <label>30%警觉视野增量(°)</label><input type="number" id="cfg-alert30-fov" value="30">
        <label>60%警觉转头倍率</label><input type="number" id="cfg-alert60-speed" value="2" step="0.1">
        <label>60%警觉视野增量(°)</label><input type="number" id="cfg-alert60-fov" value="30">
      </div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <button id="btn-reset-config" class="btn-reset-config">还原默认配置</button>
      </div>
    </details>

    <button id="btn-reset">重新开始</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
